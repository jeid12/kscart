# Render blueprint for the KasiCart backend.
# In Render: New + → Blueprint → connect this repo. Render reads this file.
# Secret values are marked sync:false so you set them in the dashboard.
services:
  - type: web
    name: kasicart-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MOMO_USSD_TEMPLATE
        value: "*182*8*1*{code}*{amount}#"
